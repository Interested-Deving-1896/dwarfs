# Minimal CI — upstream tracking fork
# Runs on push, schedule, and manual trigger.

stages:
  - secret-scan
  - info

upstream-info:
  stage: info
  image: alpine:3.19
  before_script:
    - apk add --no-cache git
  script:
    - echo "Repo: $CI_PROJECT_PATH"
    - echo "Branch: $CI_COMMIT_BRANCH"
    - echo "Commit: $CI_COMMIT_SHORT_SHA — $CI_COMMIT_TITLE"
    - echo "Author: $CI_COMMIT_AUTHOR"
    - echo "Timestamp: $CI_COMMIT_TIMESTAMP"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - when: manual
      allow_failure: true

secret-scan:
  stage: secret-scan
  image: python:3.12-slim
  before_script:
    - pip install git-filter-repo --quiet
  script:
    - |
      echo "Scanning commit history for leaked GitLab PATs..."
      git log --all -p | grep -E "glpat-[A-Za-z0-9_-]{20,}" && echo "LEAKED TOKEN DETECTED" && exit 1 || echo "No leaked tokens found."
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH =~ /^(main|master)$/'
