# Minimal CI — upstream tracking fork
# Runs on schedule to report the last commit and confirm the repo is reachable.
# Add project-specific jobs as needed.

stages:
  - info

upstream-info:
  stage: info
  image: alpine:3.19
  before_script:
    - apk add --no-cache git
  script:
    - echo "Repo: $CI_PROJECT_PATH"
    - echo "Branch: $CI_COMMIT_BRANCH"
    - echo "Commit: $CI_COMMIT_SHORT_SHA — $CI_COMMIT_TITLE"
    - echo "Author: $CI_COMMIT_AUTHOR"
    - echo "Timestamp: $CI_COMMIT_TIMESTAMP"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - when: manual
      allow_failure: true
